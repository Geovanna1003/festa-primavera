<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Festa da Primavera</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

  <div class="max-w-2xl mx-auto min-h-screen bg-white flex flex-col justify-between shadow-lg">

    <!-- TOPO -->
    <div class="bg-green-700 text-white text-center px-4 py-8 md:py-10">

      <!-- LOGO -->
      <img
        src="../ASSETS/logo.png"
        alt="Logo Unigran"
        class="w-32 md:w-32 mx-auto mb-4"
      />

      <!-- TITULO -->
      <h1 class="text-3xl md:text-4xl font-bold">
         Festa da Primavera
      </h1>

      <!-- SUBTITULO -->
      <p class="mt-3 text-lg md:text-xl">
        Ajude a Amazônia
      </p>

    </div>

    <!-- IMAGEM AMAZÔNIA -->
    <div class="w-full">

      <img
        src="./ASSETS/amazonia.png"
        alt="Amazônia"
        class="w-full h-52 md:h-72 object-cover"
      />

    </div>

    <!-- BOTÕES -->
    <div class="p-5 md:p-8 flex flex-col gap-5">

      
        <a href="pesquisa.html" class="bg-green-700 hover:bg-green-800 transition-all duration-300  
          text-white text-xl md:text-2xl font-bold py-5 rounded-2xl shadow-md text-center block">
          
              Responder Pesquisa

        </a>
        

        <a href="doacao.html" class="bg-red-700 hover:bg-red-800 transition-all duration-300   text-white text-xl md:text-2xl font-bold py-5 rounded-2xl shadow-md text-center block">

              Fazer Doação 
        </a>

        <a href="cursos.html" class="bg-blue-700 hover:bg-blue-800 transition-all duration-300 text-white text-xl md:text-2xl font-bold py-5 rounded-2xl shadow-md text-center block">

              Conhecer Cursos
        </a>

    </div>

    <!-- QR CODE -->
    <div class="text-center p-6 md:p-10">

      <img
        src="ASSETS/qr-code.png"
        alt="QR Code"
        class="w-44 md:w-60 mx-auto"
      />

      <p class="mt-4 text-gray-600 text-sm md:text-base">
        Escaneie para participar
      </p>

    </div>

  </div>

</body>
</html>
