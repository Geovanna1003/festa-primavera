<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doação</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-2xl rounded-3xl shadow-xl overflow-hidden">

    <!-- IMAGEM -->
    <img
        src="../ASSETS/uni.png"
        alt="Amazônia"
        class="object-center "
    >

    <!-- CONTEÚDO -->
    <div class="p-6 md:p-10 text-center">

        <h1 class="text-3xl md:text-4xl font-bold text-green-900 mb-6">
            Ajude a Amazônia
        </h1>

        <p class="text-lg md:text-xl text-gray-700 leading-8 mb-8">

            Sua contribuição ajuda projetos sociais,
            educacionais e ações de apoio às comunidades
            da Amazônia.

        </p>

        <!-- QR CODE -->
        <div class="flex justify-center">

            <img
                src="../img/qrcode.png"
                alt="QR Code Doação"
                class="w-56 md:w-72 hover:scale-105 transition-all duration-300"
            >

        </div>

        <p class="mt-6 text-gray-500">
            Escaneie o QR Code para doar
        </p>

        <!-- BOTÃO VOLTAR -->
        <div class="flex justify-center">

            <a href="./index.html" class="mt-8 inline-block bg-green-700 hover:bg-green-900 text-white font-bold py-4 px-8 rounded-2xl transition-all duration-300 active:scale-95"
            >
                Voltar
            </a>

        </div>

    </div>

</div>

</body>
</html>
