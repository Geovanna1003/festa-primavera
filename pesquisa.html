<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pesquisa</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

<div class="bg-white w-full max-w-2xl rounded-3xl shadow-xl p-6 md:p-10">
    <img  src="../ASSETS/logo.png" alt="Logo Unigran" class="w-32 md:w-32 mx-auto mb-6">
    <h1 class="text-3xl font-bold text-center text-green-900 mb-8">
        Pesquisa Unigran
    </h1>

    <form  id="formulario" class="flex flex-col gap-6">

        <div>
            <label class="block mb-2 font-semibold">
                Você pretende iniciar uma graduação?
            </label>

            <select name="graduacao" class="w-full border rounded-xl p-4 text-lg outline-none focus:ring-4 focus:ring-green-200"
            >
                <option>Selecione</option>
                <option>Sim</option>
                <option>Não</option>
            </select>
        </div>

        <div>
            <label class="block mb-2 font-semibold">
                Qual curso te interessa?
            </label>

            <input
             type="text"
             name="curso"
             class="w-full border rounded-xl p-4 text-lg outline-none focus:ring-4 focus:ring-green-200"
             placeholder="Digite aqui"
            />
        </div>
         <div>
            <label class="block mb-2 font-semibold">
                Digite seu nome
            </label>

            <input
             type="text"
             name="nome"
             class="w-full border rounded-xl p-4 text-lg outline-none focus:ring-4 focus:ring-green-200"
             placeholder="Digite aqui"
            />
        </div>

        <button
         id="btnEnviar"
         type="submit"
         class="bg-green-700 text-white py-5 rounded-2xl text-xl font-bold hover:bg-green-900 transition-all"
        >
            Enviar Pesquisa
        </button>

            <p id="mensagemStatus" class="text-center font-semibold mt-4"></p>

    </form>
    <div class="flex justify-center">

    <a
        href="./index.html"
        class="mt-8 inline-block bg-green-700 hover:bg-green-900 text-white font-bold py-4 px-8 rounded-2xl transition-all duration-300"
    >
        Voltar
    </a>

</div>

</div>
<script src="../JS/script.js"></script>
</body>
</html>
